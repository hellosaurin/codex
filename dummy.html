<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello There</title>
  <style>
    :root {
      color-scheme: light;
      --text: #182430;
      --accent: #cb693f;
      --panel: rgba(255, 255, 255, 0.8);
      --shadow: rgba(18, 28, 38, 0.18);
      --line: rgba(255, 255, 255, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      overflow: hidden;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(248, 244, 236, 0.2), rgba(222, 232, 243, 0.2)),
        url("./nyc-background.png") center / cover no-repeat;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.5), transparent 24%);
      opacity: 0.9;
    }

    body::after {
      background:
        linear-gradient(180deg, rgba(251, 248, 242, 0.52), rgba(212, 225, 239, 0.38));
    }

    .hero {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
      padding: 56px 40px;
      border-radius: 28px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 18px auto 0;
      max-width: 32rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
    }

    .accent {
      color: var(--accent);
      font-style: italic;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 40px 24px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Hello there</h1>
    <p>
      A friendly landing page with a soft editorial feel and one simple message:
      <span class="accent">welcome in.</span>
    </p>
  </main>
</body>
</html>
