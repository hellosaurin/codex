<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello There</title>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #f7efe4;
      --bg-bottom: #d7e7f5;
      --text: #1d2a38;
      --accent: #d96c3d;
      --panel: rgba(255, 255, 255, 0.72);
      --shadow: rgba(34, 46, 60, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 40%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    }

    .hero {
      width: min(720px, 100%);
      padding: 56px 40px;
      border-radius: 28px;
      text-align: center;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      text-transform: lowercase;
    }

    p {
      margin: 18px auto 0;
      max-width: 32rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
    }

    .accent {
      color: var(--accent);
      font-style: italic;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 40px 24px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>hello there</h1>
    <p>
      A friendly landing page with a soft editorial feel and one simple message:
      <span class="accent">welcome in.</span>
    </p>
  </main>
</body>
</html>
